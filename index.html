<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Camera Fixed Version</title>
    
    <!-- นำเข้า Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
        }

        .btn-start:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        #camera-box {
            position: relative;
            margin: 24px 0;
            min-height: 280px;
            background: #f1f5f9;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ใช้แท็ก Video มาตรฐานช่วยให้เบราว์เซอร์เปิดกล้องได้ง่ายที่สุด */
        #webcam-video {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transform: scaleX(-1); /* โหมดกระจกเงา */
            display: none;
            border-radius: 12px;
        }

        #hidden-canvas {
            display: none;
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fee2e2;
            margin-top: 15px;
            display: none;
            text-align: left;
            line-height: 1.6;
        }

        #label-container {
            text-align: left;
            margin-top: 20px;
        }

        .prediction-item {
            margin-bottom: 12px;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            background-color: #e2e8f0;
            border-radius: 9999px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <div class="subtitle">ระบบวิเคราะห์ข้อมูลภาพจากกล้องอัตโนมัติทุก ๆ 3 วินาที</div>
    
    <button type="button" class="btn-start" id="start-btn" onclick="startCameraProcess()">เปิดใช้งานกล้อง</button>
    
    <div id="error-box" class="error-message"></div>
    
    <div id="camera-box">
        <span id="placeholder-text" style="color: #94a3b8;">กดปุ่มด้านบนเพื่อเริ่มเปิดกล้อง</span>
        <video id="webcam-video" autoplay playsinline muted></video>
    </div>
    
    <!-- Canvas ลับใช้สำหรับแปลงเฟรมภาพส่งให้โมเดล AI ประมวลผล -->
    <canvas id="hidden-canvas" width="224" height="224"></canvas>
    
    <div id="label-container"></div>
</div>

<!-- โหลด TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดล Teachable Machine ของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/X4s3_yWKNc/";[cite: 1, 2]
    
    let model, maxPredictions;
    let predictInterval;

    function displayError(msg) {
        const errorBox = document.getElementById("error-box");
        errorBox.innerHTML = msg;
        errorBox.style.display = "block";
        
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = false;
        startBtn.innerText = "ลองเปิดกล้องอีกครั้ง";
    }

    async function startCameraProcess() {
        const startBtn = document.getElementById("start-btn");
        const errorBox = document.getElementById("error-box");
        const placeholderText = document.getElementById("placeholder-text");
        
        errorBox.style.display = "none";
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";

        try {
            // 1. โหลดโมเดล AI ของ Teachable Machine[cite: 1, 2]
            const modelURL = URL + "model.json";[cite: 1, 2]
            const metadataURL = URL + "metadata.json";[cite: 1, 2]
            model = await tmImage.load(modelURL, metadataURL);[cite: 1, 2]
            maxPredictions = model.getTotalClasses();[cite: 1, 2]

            startBtn.innerText = "กำลังเข้าถึงกล้องเว็บแคม...";

            // 2. เรียกเปิดกล้องผ่านระบบ Native API ของบราวเซอร์โดยตรง เพื่อความเสถียรสูงสุด[cite: 2]
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("บราวเซอร์เวอร์ชันนี้ไม่ยอมรับการเปิดกล้องในโหมดไฟล์ปกติ หรือ อุปกรณ์ไม่มีกล้องติดตั้งอยู่");
            }

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 300, height: 300, facingMode: "user" },
                audio: false
            });

            // 3. ปล่อยภาพสตรีมเข้าสู่แท็ก <video>
            const video = document.getElementById("webcam-video");
            video.srcObject = stream;
            video.style.display = "block";
            
            if(placeholderText) placeholderText.style.display = "none";
            document.getElementById("camera-box").style.border = "none";

            // 4. สร้างแผงแสดงเปอร์เซ็นต์ผลลัพธ์ (Progress Bar)
            const labelContainer = document.getElementById("label-container");[cite: 1, 2]
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 1, 2]
                const item = document.createElement("div");
                item.className = "prediction-item";
                item.innerHTML = `
                    <div class="label-text">
                        <span class="class-name" id="name-${i}">กำลังตรวจจับ...</span>
                        <span class="class-prob" id="prob-${i}">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="bar-${i}"></div>
                    </div>
                `;
                labelContainer.appendChild(item);
            }

            startBtn.innerText = "ระบบวิเคราะห์กำลังทำงาน...";

            // สั่งทำนายครั้งแรกทันที
            await runPrediction();

            // ** ลูปทำงานจับภาพและวิเคราะห์ผลลัพธ์ใหม่ทุกๆ 3 วินาทีพอดี **[cite: 1, 2]
            predictInterval = setInterval(runPrediction, 3000);

        } catch (err) {
            console.error(err);
            let errorMessage = "<strong>⚠️ ไม่สามารถเปิดกล้องได้:</strong> ";
            if (err.name === "NotAllowedError" || err.message.includes("permission")) {
                errorMessage += "คุณกดปฏิเสธสิทธิ์การใช้กล้อง โปรดดูที่สัญลักษณ์รูปแม่กุญแจหรือรูปกล้องด้านบนแถบที่อยู่เว็บ (URL Bar) แล้วกดยอมรับ 'อนุญาตสิทธิ์ (Allow)'";
            } else {
                errorMessage += err.message + "<br><br>💡 <strong>คำแนะนำเพิ่มเติม:</strong> บราวเซอร์รุ่นใหม่ป้องกันความปลอดภัยโดยห้ามดับเบิ้ลคลิกไฟล์ HTML จากเครื่องเปิดกล้องตรง ๆ ให้แก้ไขด้วยการใช้โปรแกรม **VS Code** แล้วคลิกขวาเลือกเปิดไฟล์ผ่านปลั๊กอิน **Live Server** แทนครับ";
            }
            displayError(errorMessage);
        }
    }

    // ฟังก์ชันดึงภาพปัจจุบันส่งให้ AI ทำนายผล (เรียกทุก 3 วินาที)
    async function runPrediction() {
        if (!model) return;
        
        const video = document.getElementById("webcam-video");
        const canvas = document.getElementById("hidden-canvas");
        const ctx = canvas.getContext("2d");
        
        // ก๊อปปี้ภาพเฟรมปัจจุบันจากวิดีโอไปใส่ใน Canvas ลับ
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // ส่งต่อให้ Teachable Machine คำนวณความน่าจะเป็น[cite: 1, 2]
        const prediction = await model.predict(canvas);[cite: 1, 2]
        
        // อัปเดตข้อมูลขึ้นหน้าเว็บ
        for (let i = 0; i < maxPredictions; i++) {[cite: 1, 2]
            const className = prediction[i].className;[cite: 1, 2]
            const probability = prediction[i].probability;
            const percentage = (probability * 100).toFixed(0) + "%";
            
            document.getElementById(`name-${i}`).innerText = className;
            document.getElementById(`prob-${i}`).innerText = percentage;
            document.getElementById(`bar-${i}`).style.width = percentage;
        }
    }
</script>

</body>
</html>
