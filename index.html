<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Model - Camera Native Fixed</title>
    
    <!-- นำเข้า Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error-bg: #fef2f2;
            --error-text: #ef4444;
            --error-border: #fee2e2;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
        }

        .btn-start:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        #camera-wrapper {
            position: relative;
            margin: 24px 0;
            min-height: 280px;
            background: #f1f5f9;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ใช้แท็กวิดีโอแท้เพื่อให้เบราว์เซอร์ยอมเปิดกล้องได้ง่ายที่สุด */
        #webcam-video {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transform: scaleX(-1); /* โหมดกระจกเงาเพื่อความคุ้นชิน */
            display: none;
            border-radius: 12px;
        }

        .error-box {
            color: var(--error-text);
            font-size: 13px;
            padding: 14px;
            background: var(--error-bg);
            border-radius: 8px;
            border: 1px solid var(--error-border);
            margin-top: 15px;
            display: none;
            text-align: left;
            line-height: 1.6;
        }

        #label-container {
            text-align: left;
            margin-top: 20px;
        }

        .prediction-item {
            margin-bottom: 12px;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .progress-bar-bg {
            background-color: #e2e8f0;
            border-radius: 9999px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.4s ease;
        }

        #hidden-canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <div class="subtitle">ระบบวิเคราะห์ภาพด้วย AI อัตโนมัติทุก ๆ 3 วินาที</div>
    
    <button type="button" class="btn-start" id="start-btn" onclick="initApp()">เริ่มต้นเปิดกล้อง</button>
    
    <!-- กล่องแสดงข้อความเตือนเมื่อเปิดกล้องไม่ได้ -->
    <div id="error-message" class="error-box"></div>
    
    <div id="camera-wrapper">
        <span id="placeholder-text" style="color: #94a3b8; padding: 10px;">กรุณากดปุ่มเพื่อเชื่อมต่อกล้องเว็บแคม</span>
        <video id="webcam-video" autoplay playsinline muted></video>
    </div>
    
    <!-- Canvas ลับที่ใช้แอบก๊อปปี้เฟรมจากภาพวิดีโอส่งไปให้ AI ประมวลผล -->
    <canvas id="hidden-canvas" width="224" height="224"></canvas>
    
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารี TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลจาก Teachable Machine ของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/X4s3_yWKNc/";[cite: 1, 2]
    
    let model, maxPredictions;
    let predictInterval;

    function triggerError(msg) {
        const errorBox = document.getElementById("error-message");
        errorBox.innerHTML = msg;
        errorBox.style.display = "block";
        
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = false;
        startBtn.innerText = "ลองเปิดกล้องอีกครั้ง";
    }

    async function initApp() {
        const startBtn = document.getElementById("start-btn");
        const errorBox = document.getElementById("error-message");
        const placeholder = document.getElementById("placeholder-text");
        
        errorBox.style.display = "none";
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล AI...";

        try {
            // 1. โหลดไฟล์โมเดลจากลิงก์[cite: 1, 2]
            const modelURL = URL + "model.json";[cite: 1, 2]
            const metadataURL = URL + "metadata.json";[cite: 1, 2]
            model = await tmImage.load(modelURL, metadataURL);[cite: 1, 2]
            maxPredictions = model.getTotalClasses();[cite: 1, 2]

            startBtn.innerText = "กำลังเชื่อมต่ออุปกรณ์กล้อง...";

            // 2. เรียกใช้งานกล้องผ่าน WebRTC API แท้ๆ ของเบราว์เซอร์[cite: 2]
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("ระบบความปลอดภัยของเบราว์เซอร์ปฏิเสธคำสั่งเปิดกล้อง (เกิดขึ้นเมื่อเปิดไฟล์ .html ตรงๆ จากเครื่องคอมพิวเตอร์)");
            }

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 300, height: 300, facingMode: "user" },
                audio: false
            });

            // 3. ปล่อยสตรีมภาพสดเข้าที่แท็กวิดีโอ
            const video = document.getElementById("webcam-video");
            video.srcObject = stream;
            video.style.display = "block";
            
            if (placeholder) placeholder.style.display = "none";
            document.getElementById("camera-wrapper").style.border = "none";

            // 4. สร้างแผงแสดงเปอร์เซ็นต์แบบ Progress Bar ตามจำนวน Class ของโมเดล[cite: 1, 2]
            const labelContainer = document.getElementById("label-container");[cite: 1, 2]
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 1, 2]
                const item = document.createElement("div");
                item.className = "prediction-item";
                item.innerHTML = `
                    <div class="label-text">
                        <span class="class-name" id="name-${i}">กำลังรอภาพ...</span>
                        <span class="class-prob" id="prob-${i}">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="bar-${i}"></div>
                    </div>
                `;
                labelContainer.appendChild(item);
            }

            startBtn.innerText = "ระบบวิเคราะห์กำลังทำงาน...";

            // สั่งทำนายผลครั้งแรกทันที
            await processPrediction();

            // **กำหนดให้ระบบดึงเฟรมภาพไปทำนายผลใหม่ทุกๆ 3 วินาที (3000 มิลลิวินาที)**[cite: 1, 2]
            predictInterval = setInterval(processPrediction, 3000);

        } catch (err) {
            console.error(err);
            let userAlert = "<strong>❌ เกิดข้อผิดพลาดในการเปิดกล้อง:</strong> ";
            
            if (err.name === "NotAllowedError" || err.message.includes("permission")) {
                userAlert += "สิทธิ์การเข้าถึงกล้องถูกปฏิเสธ โปรดดูที่แถบกรอกเว็บ (URL Bar) ด้านบนสุด คลิกที่ **ไอคอนรูปแม่กุญแจ** หรือรูปกล้อง แล้วตั้งค่าเป็น **'อนุญาต (Allow)'**";
            } else {
                userAlert += err.message + "<br><br>💡 <strong>สาเหตุและวิธีแก้ไข:</strong> เบราว์เซอร์ปัจจุบันห้ามไม่ให้เปิดกล้องเมื่อเปิดไฟล์ `.html` แบบดับเบิ้ลคลิกตรงๆ จากในโฟลเดอร์เครื่องคอมพิวเตอร์เพื่อความปลอดภัย<br>โปรดรันโค้ดนี้ผ่านโปรแกรม **VS Code** แล้วคลิกขวาเลือกเปิดด้วยปลั๊กอิน **Live Server** หรืออัปโหลดไฟล์ไปรันบนเว็บที่เป็น HTTPS แทนครับ";
            }
            triggerError(userAlert);
        }
    }

    // ฟังก์ชันในการดึงภาพนิ่งจากวิดีโอแล้วส่งไปให้ AI ประมวลผล (ทำงานทุกๆ 3 วินาที)
    async function processPrediction() {
        if (!model) return;
        
        const video = document.getElementById("webcam-video");
        const canvas = document.getElementById("hidden-canvas");
        const ctx = canvas.getContext("2d");
        
        // ก๊อปปี้ภาพเฟรม ณ เสี้ยววินาทีนั้นจากวิดีโอสดลงไปใน Canvas ลับ
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // ส่งต่อ Canvas ให้ตัวประมวลผลของ Teachable Machine ทำนายผลลัพธ์[cite: 1, 2]
        const prediction = await model.predict(canvas);[cite: 1, 2]
        
        // นำผลลัพธ์เปอร์เซ็นต์ที่ได้มาอัปเดตอิงตามแท็ก UI
        for (let i = 0; i < maxPredictions; i++) {[cite: 1, 2]
            const className = prediction[i].className;[cite: 1, 2]
            const probability = prediction[i].probability;
            const percentage = (probability * 100).toFixed(0) + "%";
            
            document.getElementById(`name-${i}`).innerText = className;
            document.getElementById(`prob-${i}`).innerText = percentage;
            document.getElementById(`bar-${i}`).style.width = percentage;
        }
    }
</script>

</body>
</html>
